<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pipeline Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1f4037, #99f2c8);
            text-align: center;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 3em;
        }

        .pipeline {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .stage {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            width: 120px;
            transition: 0.3s;
        }

        .stage:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .success {
            border: 2px solid #00ff00;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 DevOps CI/CD Pipeline</h1>
    <p>Automated Build | Test | Deploy</p>

    <div class="pipeline">
        <div class="stage success">Code</div>
        <div class="stage success">Build</div>
        <div class="stage success">Test</div>
        <div class="stage success">Deploy</div>
    </div>

    <footer>
        <p>Deployed using CI/CD Pipeline</p>
    </footer>
</div>

</body>
</html>
